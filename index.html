<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Generic CSV Datatables Viewer v2512G1</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <!-- DataTables CSS for Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.datatables.net/2.3.4/css/dataTables.dataTables.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/2.3.4/css/dataTables.bootstrap5.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/buttons/3.2.5/css/buttons.bootstrap5.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/rowgroup/1.6.0/css/rowGroup.bootstrap5.min.css">  
  <link rel="stylesheet" href="https://cdn.datatables.net/select/3.1.3/css/select.dataTables.css">
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <!-- Bootstrap 5 JS (for dropdowns/buttons) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- DataTables + Bootstrap 5 integration -->
  <script src="https://cdn.datatables.net/2.3.4/js/dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/2.3.4/js/dataTables.bootstrap5.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/3.2.5/js/dataTables.buttons.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/3.2.5/js/buttons.bootstrap5.min.js"></script>
  <script src="https://cdn.datatables.net/rowgroup/1.6.0/js/dataTables.rowGroup.min.js"></script>
  <script src="https://cdn.datatables.net/rowgroup/1.6.0/js/rowGroup.bootstrap5.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/3.2.5/js/buttons.colVis.min.js"></script>
  <script src="https://cdn.datatables.net/responsive/3.0.6/js/dataTables.responsive.min.js"></script>
  <script src="https://cdn.datatables.net/responsive/3.0.6/js/responsive.bootstrap5.min.js"></script>
  <script src="https://cdn.datatables.net/select/3.1.3/js/dataTables.select.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito+Sans&display=swap');
    *{
      font-family: "Nunito Sans", monospace;
      font-size: 1.0rem;
    }
    thead input {
      width: 100%;
      box-sizing: border-box;
    }
    #iplTable tbody tr:hover {
        background-color: yellow !important;
        color: #000044;
    }
    #loadingMessage {
      text-align: center;
      padding: 20px;
      font-size: 1.2rem;
      color: #666;
    }
	.qrcode {
      display: none;
    }
    .qrcode.show {
      display: block;
    }
	.barcode {
      display: none;
    }
    .barcode.show {
      display: block;
    }
  </style>
</head>
<body class="bg-light">

  <div class="container-fluid py-2">
    <div class="row">
      <div class="col-md-5"><h3 class="mb-4" style="padding: 0; margin: 0; line-height: 1.0;">CSV Datatables Viewer</h3></div>
      <div class="col-md-2 d-flex align-items-end"><small class="mb-4">Version 2512G1</small></div>
      <div class="col-md-5"><input type="file" id="csvFile" accept=".csv" class="form-control mb-4"></div>
    </div>
    <div id="loadingMessage">Please choose a file...</div>
    <table id="iplTable" class="table table-striped table-hover hover compact"></table>
  </div>

  <script>
let qrCodesVisible = false;
let barCodesVisible = false;

function parseCSV(text) {
  const lines = text.replace(/\r/g, '').split('\n').filter(l => l.length);
  const headers = lines[0].split(',');

  const data = lines.slice(1).map(line => {
    const result = [];
    let current = '';
    let inQuotes = false;

    for (let i = 0; i < line.length; i++) {
      const char = line[i];

      if (char === '"' && line[i + 1] === '"') {
        current += '"';
        i++;
      } else if (char === '"') {
        inQuotes = !inQuotes;
      } else if (char === ',' && !inQuotes) {
        result.push(current);
        current = '';
      } else {
        current += char;
      }
    }

    result.push(current);

    // Ensure row length matches header length
    while (result.length < headers.length) {
      result.push('');
    }

    return result;
  });

  return { headers, data };
}

function initializeTable(csvText) {
  const { headers, data } = parseCSV(csvText);
  
  if ($.fn.DataTable.isDataTable('#iplTable')) {
    $('#iplTable').DataTable().destroy();
    $('#iplTable').empty();
  }
  
  $('#loadingMessage').hide();
  
  // Header rows with column titles and search inputs
  const thead = $('<thead><tr></tr><tr></tr></thead>');
  headers.forEach(h => {
    thead.find('tr').first().append(`<th>${h}</th>`);
    thead.find('tr').last().append(`<th><input type="text" placeholder="Search ${h}" class="form-control form-control-sm" /></th>`);
  });
  $('#iplTable').append(thead).append('<tbody></tbody>');
  
  const table = $('#iplTable').DataTable({
    data: data,
    order: [[1, 'asc']],
    autoWidth: true,
    rowGroup: {
      dataSrc: null,
      startRender: function (rows, group) {
        if (group === null || group === undefined) {
          return '';
        } else {
          return group + ' (' + rows.count() + ' items)';
        }
      }
    },
	select: {
        style: 'multi'
    },
	columns: headers.map((h, index) => {
	  /*
	  if (index === 2) { // 3rd column (LOC)
		return {
		  title: h,
		  render: function(data, type, row) {
			if (typeof data === 'string' && data.startsWith('40')) {
			  return '<span style="color: #FFF; background-color: #0A0;">' + data + '</span>';
			}
			if (typeof data === 'string' && data.startsWith('44')) {
			  return '<span style="color: #FFF; background-color: #A00;">' + data + '</span>';
			}
			return data;
		  }
		};
	  }
	  */
	  if (index === 0 || index === 1) { 
		return {
			title: h,
			render: function(data, type, row) {
				return `
					<div>
						<div>${data}</div>
						<svg class="barcode" data-value="${data}"></svg>
						<div class="qrcode" data-value="${data}" height=1px></div>
					</div>
				`;
			}
		};
	  }
                // Delay barcode generation until after cell is rendered
                /*
				setTimeout(() => {
                    JsBarcode('#' + barcodeId, data, {format: "CODE128", height: 30, displayValue: false});
                }, 0);
				return html;
				*/
	  return { title: h };
	}),
    orderCellsTop: true,
    fixedHeader: true,
    dom: "<'row mb-2'<'col-sm-6'l><'col-sm-6 text-end'B>>" + 
         "rt" + 
         "<'row'<'col-sm-5'i><'col-sm-7'p>>",
    buttons: [
  	  { 
	    text: 'Show Selected',
		className: 'btn-show-selected',
		action: function (e, dt, node, config) {
		  const currentText = $(node).text();
		  
		  if (currentText === 'Show Selected') {
		    // Filter to show only selected rows
		    const selected = dt.rows({ selected: true }).indexes().toArray();
		    if (selected.length === 0) {
		      alert('No rows selected');
		      return;
		    }
		    
		    // Custom search function to show only selected rows
		    $.fn.dataTable.ext.search.push(function(settings, data, dataIndex) {
		      return selected.includes(dataIndex);
		    });
		    
		    dt.draw();
		    $(node).text('Show All');
		    $(node).addClass('btn-warning');
		  } else {
		    // Show all rows again
		    $.fn.dataTable.ext.search.pop();
		    dt.draw();
		    $(node).text('Show Selected');
		    $(node).removeClass('btn-warning');
		  }
		}
	  },
	  { 
	    text: 'QR',
		action: function (e, dt, node, config) {
		  toggleQRCodes();
		  $(node).toggleClass('btn-warning');
		}
	  },
	  { 
	    text: 'Bar',
		action: function (e, dt, node, config) {
		  toggleBarCodes();
		  $(node).toggleClass('btn-warning');
		}
	  },
      'colvis',
	  {
        text: 'GRP C2',
        action: function (e, dt, node, config) {
          const rowGroup = dt.rowGroup();
		  $(node).toggleClass('btn-warning');
          if (rowGroup.dataSrc() === null) {
            dt.rowGroup().dataSrc(1);
            dt.order([[1, 'asc']]).draw();
          } else {
            dt.rowGroup().dataSrc(null);
            dt.draw();
          }
        }
      },
      {
        text: 'C3',
        action: function (e, dt, node, config) {
          const rowGroup = dt.rowGroup();
		  $(node).toggleClass('btn-warning');
          if (rowGroup.dataSrc() === null) {
            dt.rowGroup().dataSrc(2);
            dt.order([[2, 'asc']]).draw();
          } else {
            dt.rowGroup().dataSrc(null);
            dt.draw();
          }
        }
      },
      {
        text: 'C4',
        action: function (e, dt, node, config) {
          const rowGroup = dt.rowGroup();
		  $(node).toggleClass('btn-warning');
          if (rowGroup.dataSrc() === null) {
            dt.rowGroup().dataSrc(3);
            dt.order([[3, 'asc']]).draw();
          } else {
            dt.rowGroup().dataSrc(null);
            dt.draw();
          }
        }
      },
	  {
        text: 'C5',
        action: function (e, dt, node, config) {
          const rowGroup = dt.rowGroup();
		  $(node).toggleClass('btn-warning');
          if (rowGroup.dataSrc() === null) {
            dt.rowGroup().dataSrc(4);
            dt.order([[4, 'asc']]).draw();
          } else {
            dt.rowGroup().dataSrc(null);
            dt.draw();
          }
        }
      },
	  {
        text: 'C6',
        action: function (e, dt, node, config) {
          const rowGroup = dt.rowGroup();
		  $(node).toggleClass('btn-warning');
          if (rowGroup.dataSrc() === null) {
            dt.rowGroup().dataSrc(5);
            dt.order([[5, 'asc']]).draw();
          } else {
            dt.rowGroup().dataSrc(null);
            dt.draw();
          }
        }
      },
	  {
        text: 'C7',
        action: function (e, dt, node, config) {
          const rowGroup = dt.rowGroup();
		  $(node).toggleClass('btn-warning');
          if (rowGroup.dataSrc() === null) {
            dt.rowGroup().dataSrc(6);
            dt.order([[6, 'asc']]).draw();
          } else {
            dt.rowGroup().dataSrc(null);
            dt.draw();
          }
        }
      }
    ],
    lengthChange: true,
    pageLength: 25,
    lengthMenu: [[10, 25, 50, 100, 250, 500], [10, 25, 50, 100, 250, 500]],
    responsive: true
  });
  
  // Column search inputs
  $('#iplTable thead tr:eq(1) th input').each(function (i) {
    $(this).on('keyup change', function () {
      if (table.column(i).search() !== this.value) {
        table.column(i).search(this.value).draw();
      }
    });
  });
  
  function renderBarcodes() {
    $('#iplTable tbody svg.barcode').each(function() {
        const value = $(this).data('value');
        if (!$(this).data('rendered')) {
            JsBarcode(this, value, { format: "CODE128", height: 15, margin: 5, displayValue: false });
            $(this).data('rendered', true);
        }
    });
  }
  
  function renderQRCodes() {
    $('#iplTable tbody div.qrcode').each(function() {
        const value = String($(this).data('value'));
        if (!$(this).data('rendered')) {
            new QRCode(this, {
                text: value,
                width: 50,   // width of QR code
                height: 50,  // height of QR code
                correctLevel: QRCode.CorrectLevel.H
            });
            $(this).data('rendered', true);
        }
    });
  }
  
  function toggleQRCodes() {
    qrCodesVisible = !qrCodesVisible;
    
    if (qrCodesVisible) {
      $('#iplTable tbody div.qrcode').addClass('show');
      renderQRCodes();
    } else {
      $('#iplTable tbody div.qrcode').removeClass('show');
    }
  }

  function toggleBarCodes() {
    barCodesVisible = !barCodesVisible;
    
    if (barCodesVisible) {
      $('#iplTable tbody svg.barcode').addClass('show');
      renderBarcodes();
    } else {
      $('#iplTable tbody svg.barcode').removeClass('show');
    }
  }
  
  // After table initialization
  //renderBarcodes();
  //renderQRCodes();   // initial render

  //table.on('draw', renderBarcodes);
  //table.on('draw', renderQRCodes);  // redraw after filtering, paging, sorting
}

$(document).ready(function () {
  // Auto-load picklists.csv on page load
  /*
  fetch('./picklists.csv')
    .then(response => {
      if (!response.ok) {
        throw new Error('Could not load picklists.csv');
      }
      return response.text();
    })
    .then(csvText => {
      initializeTable(csvText);
    })
    .catch(error => {
      $('#loadingMessage').text('Error loading picklists.csv: ' + error.message).css('color', 'red');
      console.error('Error:', error);
    });
  */
  
  // File input for loading other CSV files
  $('#csvFile').on('change', function (e) {
    const file = e.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = function (e) {
      const csvText = e.target.result;
      initializeTable(csvText);
    };
    reader.readAsText(file);
  });
});
  </script>

</body>
</html>
